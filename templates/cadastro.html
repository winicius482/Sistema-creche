<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Cadastro de Aluno</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<div class="container mt-5 mb-5">

    <div class="card shadow-lg">

        <div class="card-header bg-primary text-white">

            <h2 class="text-center">
                Cadastro Completo do Aluno
            </h2>

        </div>

        <div class="card-body">

            <form method="POST">

                <!-- DADOS PESSOAIS -->

                <h4 class="text-primary mb-3">
                    Dados Pessoais
                </h4>

                <div class="row">

                    <div class="col-md-8">

                        <label>Nome Completo</label>

                        <input
                            type="text"
                            name="nome"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="col-md-4">

                        <label>Matrícula</label>

                        <input
                            type="text"
                            name="matricula"
                            class="form-control"
                            required
                        >

                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-4">

                        <label>Data de Nascimento</label>

                        <input
                            type="date"
                            name="nascimento"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="col-md-4">

                        <label>Sexo</label>

                        <select
                            name="sexo"
                            class="form-control"
                        >

                            <option>Masculino</option>
                            <option>Feminino</option>

                        </select>

                    </div>

                    <div class="col-md-4">

                        <label>Naturalidade</label>

                        <input
                            type="text"
                            name="naturalidade"
                            class="form-control"
                        >

                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-6">

                        <label>RG</label>

                        <input
                            type="text"
                            name="rg"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-6">

                        <label>CPF</label>

                        <input
                            type="text"
                            name="cpf"
                            class="form-control"
                        >

                    </div>

                </div>

                <hr class="my-5">

                <!-- ENDEREÇO -->

                <h4 class="text-primary mb-3">
                    Endereço
                </h4>

                <div class="row">

                    <div class="col-md-8">

                        <label>Rua</label>

                        <input
                            type="text"
                            name="rua"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-4">

                        <label>Número</label>

                        <input
                            type="text"
                            name="numero"
                            class="form-control"
                        >

                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-4">

                        <label>Bairro</label>

                        <input
                            type="text"
                            name="bairro"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-4">

                        <label>Cidade</label>

                        <input
                            type="text"
                            name="cidade"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-4">

                        <label>CEP</label>

                        <input
                            type="text"
                            name="cep"
                            class="form-control"
                        >

                    </div>

                </div>

                <hr class="my-5">

                <!-- RESPONSÁVEIS -->

                <h4 class="text-primary mb-3">
                    Responsáveis
                </h4>

                <div class="row">

                    <div class="col-md-6">

                        <label>Nome do Responsável</label>

                        <input
                            type="text"
                            name="nome_responsavel"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-3">

                        <label>Telefone 1</label>

                        <input
                            type="text"
                            name="telefone_1"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-3">

                        <label>Telefone 2</label>

                        <input
                            type="text"
                            name="telefone_2"
                            class="form-control"
                        >

                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-4">

                        <label>Parentesco</label>

                        <input
                            type="text"
                            name="parentesco"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-4">

                        <label>RG do Responsável</label>

                        <input
                            type="text"
                            name="responsavel_rg"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-4">

                        <label>CPF do Responsável</label>

                        <input
                            type="text"
                            name="responsavel_cpf"
                            class="form-control"
                        >

                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-12">

                        <label>Endereço completo do Responsável</label>

                        <input
                            type="text"
                            name="endereco_completo"
                            class="form-control"
                        >

                    </div>

                </div>

                <hr class="my-5">

                <!-- SAÚDE -->

                <h4 class="text-primary mb-3">
                    Informações de Saúde
                </h4>

                <div class="row">

                    <div class="col-md-4">

                        <label>Alergias</label>

                        <input
                            type="text"
                            name="alergias"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-4">

                        <label>Tipo Sanguíneo</label>

                        <select
                            name="tipo_sanguineo"
                            class="form-control"
                        >

                            <option value="">Selecione...</option>
                            <option>O+</option>
                            <option>O-</option>
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>

                        </select>

                    </div>

                    <div class="col-md-4">

                        <label>Certidão de Nascimento</label>

                        <input
                            type="text"
                            name="certidao_nascimento"
                            class="form-control"
                        >

                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-6">

                        <label>Doenças Crônicas</label>

                        <input
                            type="text"
                            name="doencas_cronicas"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-6">

                        <label>Foto (URL ou nome do arquivo)</label>

                        <input
                            type="text"
                            name="foto"
                            class="form-control"
                        >

                    </div>

                </div>

                <div class="mt-3">

                    <label>Observações Importantes</label>

                    <textarea
                        name="observacoes"
                        class="form-control"
                        rows="5"
                    ></textarea>

                </div>

                <div class="mt-3">

                    <label>Relatório Descritivo</label>

                    <textarea
                        name="relatorio_descritivo"
                        class="form-control"
                        rows="4"
                    ></textarea>

                </div>

                <div class="mt-3">

                    <label>Necessidades Especiais</label>

                    <textarea
                        name="necessidades_especiais"
                        class="form-control"
                        rows="3"
                    ></textarea>

                </div>

                <div class="mt-3">

                    <label>Comportamento</label>

                    <textarea
                        name="comportamento"
                        class="form-control"
                        rows="3"
                    ></textarea>

                </div>

                <hr class="my-5">

                <!-- VIDA ESCOLAR -->

                <h4 class="text-primary mb-3">
                    Vida Escolar
                </h4>

                <div class="row">

                    <div class="col-md-4">

                        <label>Turma</label>

                        <input
                            type="text"
                            name="turma"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-4">

                        <label>Série/Ano</label>

                        <input
                            type="text"
                            name="serie"
                            class="form-control"
                        >

                    </div>

                    <div class="col-md-4">

                        <label>Ano Letivo</label>

                        <input
                            type="text"
                            name="ano_letivo"
                            class="form-control"
                        >

                    </div>

                </div>

                <div class="mt-5">

                    <button
                        type="submit"
                        class="btn btn-primary btn-lg w-100"
                    >
                        Salvar Cadastro
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
